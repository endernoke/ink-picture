name: linting and tests

on:
  push:
    branches:
      - main
    paths:
      [
        "**.js",
        "**.ts",
        "**.jsx",
        "**.tsx",
        "**.json",
        "**.md",
        "**.yml",
        "**.yaml",
      ]
  pull_request:
    branches:
      - main
      - '**/main'
    paths:
      [
        "**.js",
        "**.ts",
        "**.jsx",
        "**.tsx",
        "**.json",
        "**.md",
        "**.yml",
        "**.yaml",
      ]

jobs:
  format:
    name: Lint and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "25.x"
          cache: "npm"

      - name: Install dependencies
        run: |
          npm ci

      - name: Run biome check + tests
        run: npm test
